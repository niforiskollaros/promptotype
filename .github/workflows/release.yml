name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build overlay + CLI bundle
        run: npm run build:all

      - name: Build Chrome extension bundle
        run: |
          npm run build:ext
          cd extension
          zip -r ../promptotype-chrome-extension.zip .
          cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            promptotype-chrome-extension.zip
