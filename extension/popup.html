<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #161618;
      color: #F0F0F2;
      font-size: 13px;
    }
    .header {
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid #333338;
    }
    .header svg { color: #7C3AED; flex-shrink: 0; }
    .header h1 { font-size: 14px; font-weight: 600; }
    .content { padding: 16px; }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      background: #1C1C1F;
      border: 1px solid #333338;
      border-radius: 8px;
      margin-bottom: 12px;
      font-size: 12px;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .status-dot.connected { background: #34D399; }
    .status-dot.disconnected { background: #F87171; }
    .status-label { color: #A0A0A8; }
    .status-value { color: #F0F0F2; font-weight: 500; margin-left: auto; }
    .btn {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      border: none;
      transition: background 0.15s, transform 0.1s;
    }
    .btn:active { transform: scale(0.98); }
    .btn-primary {
      background: #7C3AED;
      color: white;
    }
    .btn-primary:hover { background: #6D28D9; }
    .btn-primary:disabled {
      background: #333338;
      color: #6B6B74;
      cursor: not-allowed;
    }
    .btn-danger {
      background: #1C1C1F;
      color: #F87171;
      border: 1px solid #333338;
    }
    .btn-danger:hover { background: #2A2A2E; }
    .hint {
      margin-top: 12px;
      padding: 8px 10px;
      background: #1C1C1F;
      border-radius: 6px;
      font-size: 11px;
      color: #6B6B74;
      line-height: 1.5;
    }
    .hint kbd {
      background: #2A2A2E;
      border: 1px solid #333338;
      border-radius: 3px;
      padding: 1px 4px;
      font-size: 10px;
      font-family: 'SF Mono', monospace;
    }
    .error {
      color: #F87171;
      font-size: 12px;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="header">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="3" y="3" width="18" height="18" rx="3"/>
      <circle cx="8" cy="8" r="2" fill="currentColor"/>
      <line x1="13" y1="8" x2="19" y2="8" stroke-linecap="round"/>
      <line x1="7" y1="13" x2="17" y2="13" stroke-linecap="round"/>
      <line x1="7" y1="17" x2="14" y2="17" stroke-linecap="round"/>
    </svg>
    <h1>Promptotype</h1>
  </div>

  <div class="content">
    <div class="status">
      <span class="status-dot disconnected" id="mcp-dot"></span>
      <span class="status-label">MCP Server</span>
      <span class="status-value" id="mcp-status">Checking...</span>
    </div>

    <button class="btn btn-primary" id="inject-btn" disabled>
      Activate on Page
    </button>

    <div id="error-msg" class="error" style="display:none;"></div>

    <div class="hint">
      <kbd>Cmd+Shift+D</kbd> to toggle after activation.
      MCP server: <code>promptotype serve</code>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
